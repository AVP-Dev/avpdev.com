name: Notify New Content (Native)

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/blog/**/*.md'
      - 'src/content/projects/**/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send Push Notification
        run: |
          NEW_FILES=$(git diff --name-only HEAD^ HEAD | grep -E 'src/content/(blog|projects)/.*\.md' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "No new content files found."
            exit 0
          fi

          for FILE in $NEW_FILES; do
            TITLE=$(grep '^title:' "$FILE" | head -1 | sed 's/title: //;s/"//g;s/ //')
            FILENAME=$(basename "$FILE" .md)
            FOLDER=$(echo "$FILE" | cut -d'/' -f3)
            LANG=$(echo "$FILE" | cut -d'/' -f4)
            URL="https://avpdev.com/$LANG/$FOLDER/$FILENAME"
            
            # RU/EN localization for push
            if [ "$LANG" == "ru" ]; then
                BODY="Опубликован новый кейс или статья: $TITLE"
                NOTIF_TITLE="AVPdev - Новое"
            else
                BODY="New case or article published: $TITLE"
                NOTIF_TITLE="AVPdev - Updates"
            fi

            curl -X POST "https://avpdev.com/api/push/send" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.PUSH_SECRET }}" \
              -d "{\"title\": \"$NOTIF_TITLE\", \"body\": \"$BODY\", \"url\": \"$URL\"}"
          done
