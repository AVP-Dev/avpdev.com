name: Notify New Content (Native)

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/blog/**/*.md'
      - 'src/content/projects/**/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send Push Notification
        run: |
          NEW_FILES=$(git diff --name-only HEAD^ HEAD | grep -E 'src/content/(blog|projects)/.*\.md' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "No new content files found."
            exit 0
          fi

          for FILE in $NEW_FILES; do
            TITLE=$(grep -i '^title:' "$FILE" | head -1 | sed "s/^title:[ \t]*//i; s/['\"]//g")
            FILENAME=$(basename "$FILE" .md)
            FOLDER=$(echo "$FILE" | cut -d'/' -f3)
            LANG=$(echo "$FILE" | cut -d'/' -f4)
            
            # Form the correct URL depending on whether it's blog or project
            if [ "$FOLDER" == "blog" ]; then
                PATH_URL="blog"
            else
                PATH_URL="project"
            fi
            
            URL="https://avpdev.com/$LANG/$PATH_URL/$FILENAME/"
            
            # RU/EN localization for push
            if [ "$LANG" == "ru" ]; then
                BODY="$TITLE"
                NOTIF_TITLE="Новая статья в блоге!"
            else
                BODY="$TITLE"
                NOTIF_TITLE="New article published!"
            fi

            echo "Sending push for: $TITLE ($URL)"

            curl -X POST "https://avpdev.com/api/push/send?secret=${{ secrets.PUSH_SECRET }}" \
              -H "Content-Type: application/json" \
              -d "{\"title\": \"$NOTIF_TITLE\", \"body\": \"$BODY\", \"url\": \"$URL\", \"icon\": \"/favicon-96x96.png\"}"
          done
